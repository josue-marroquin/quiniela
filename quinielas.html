<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quinielas CRUD</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #6b7280;
      --line: #d9dee8;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --warn: #8a5a00;
      --warn-bg: #fff7df;
      --ok-bg: #eafaf6;
      --shadow: 0 12px 32px rgba(17, 24, 39, 0.09);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 999px;
      padding: 7px 11px;
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .form-panel {
      position: sticky;
      top: 18px;
      padding: 18px;
    }

    .panel-title,
    .table-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-title {
      margin-bottom: 14px;
    }

    .table-toolbar {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    h2 {
      margin: 0;
      font-size: 17px;
      letter-spacing: 0;
    }

    .notice {
      min-height: 40px;
      margin: 0 0 14px;
      padding: 10px 11px;
      border-radius: 7px;
      background: #edf7f5;
      border: 1px solid #b9ded8;
      color: #11443f;
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: #374151;
      font-size: 13px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid #c9d0dc;
      border-radius: 7px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.16);
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 7px;
      padding: 9px 12px;
      font-weight: 800;
      line-height: 1;
    }

    .btn.primary {
      background: var(--primary);
      color: #fff;
    }

    .btn.primary:hover {
      background: var(--primary-dark);
    }

    .btn.secondary {
      background: #eef1f6;
      color: #293241;
    }

    .btn.icon {
      width: 36px;
      min-height: 36px;
      padding: 0;
      border: 1px solid var(--line);
      background: #fff;
      color: #263241;
    }

    .table-panel {
      overflow: hidden;
    }

    .search {
      max-width: 360px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 850px;
    }

    th,
    td {
      padding: 12px 11px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      background: #f0f3f8;
      color: #374151;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    tr:hover td {
      background: #fbfcfe;
    }

    .mono {
      max-width: 260px;
      overflow-wrap: anywhere;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      color: #394150;
    }

    .score,
    .points {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 30px;
      padding: 5px 9px;
      border-radius: 7px;
      background: var(--ok-bg);
      color: #0d574d;
      font-weight: 900;
    }

    .pending {
      background: var(--warn-bg);
      color: var(--warn);
    }

    .row-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      white-space: nowrap;
    }

    .empty {
      padding: 34px 18px;
      text-align: center;
      color: var(--muted);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 860px) {
      .topbar {
        align-items: start;
        flex-direction: column;
      }

      .meta {
        justify-content: flex-start;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .form-panel {
        position: static;
      }
    }

    @media (max-width: 520px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 16px;
      }

      h1 {
        font-size: 24px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .table-toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .search {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Quinielas</h1>
      </div>
      <div class="meta" aria-live="polite">
        <a class="chip" href="partidos.html">Partidos</a>
        <span class="chip" id="totalChip">0 quinielas</span>
        <span class="chip" id="sourceChip">MySQL</span>
      </div>
    </header>

    <section class="layout">
      <form class="panel form-panel" id="quinielaForm" autocomplete="off">
        <div class="panel-title">
          <h2 id="formTitle">Nueva quiniela</h2>
          <button class="btn secondary hidden" id="cancelEdit" type="button">Cancelar</button>
        </div>

        <p class="notice" id="pointsPreview">puntos se calculara automaticamente: 0</p>

        <div class="grid">
          <div class="field">
            <label for="participante">participante</label>
            <select id="participante" name="participante" required>
              <option value="">Cargando participantes...</option>
            </select>
          </div>

          <div class="field">
            <label for="idPartido">id_partido</label>
            <select id="idPartido" name="id_partido" required>
              <option value="">Cargando partidos...</option>
            </select>
          </div>

          <div class="field">
            <label for="resultEq1">result_eq1</label>
            <input id="resultEq1" name="result_eq1" type="number" min="0" step="1" inputmode="numeric">
          </div>

          <div class="field">
            <label for="resultEq2">result_eq2</label>
            <input id="resultEq2" name="result_eq2" type="number" min="0" step="1" inputmode="numeric">
          </div>
        </div>

        <div class="actions">
          <button class="btn primary" id="submitBtn" type="submit">Guardar</button>
          <button class="btn secondary" id="clearBtn" type="button">Limpiar</button>
        </div>
      </form>

      <section class="panel table-panel">
        <div class="table-toolbar">
          <h2>Registros</h2>
          <input class="search" id="search" type="search" placeholder="Buscar participante o partido">
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>id</th>
                <th>participante</th>
                <th>partido</th>
                <th>result_eq1</th>
                <th>result_eq2</th>
                <th>puntos</th>
                <th>updated_at</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="quinielasBody"></tbody>
          </table>
          <div class="empty hidden" id="emptyState">Sin quinielas registradas</div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const API_URL = "quinielas_api.php";

    const form = document.querySelector("#quinielaForm");
    const formTitle = document.querySelector("#formTitle");
    const submitBtn = document.querySelector("#submitBtn");
    const cancelEditBtn = document.querySelector("#cancelEdit");
    const clearBtn = document.querySelector("#clearBtn");
    const body = document.querySelector("#quinielasBody");
    const emptyState = document.querySelector("#emptyState");
    const totalChip = document.querySelector("#totalChip");
    const sourceChip = document.querySelector("#sourceChip");
    const pointsPreview = document.querySelector("#pointsPreview");
    const search = document.querySelector("#search");

    const fields = {
      participante: document.querySelector("#participante"),
      idPartido: document.querySelector("#idPartido"),
      resultEq1: document.querySelector("#resultEq1"),
      resultEq2: document.querySelector("#resultEq2")
    };

    let quinielas = [];
    let partidos = [];
    let participantes = [];
    let editingId = null;

    async function request(path = "", options = {}) {
      const response = await fetch(`${API_URL}${path}`, {
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        ...options
      });

      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.detail || payload.error || "Error de servidor");
      }

      return payload;
    }

    function valueToScore(value) {
      return value === "" ? null : Number(value);
    }

    function renderScore(value) {
      if (value === null || value === undefined || value === "") {
        return '<span class="score pending">NULL</span>';
      }
      return `<span class="score">${value}</span>`;
    }

    function editIcon() {
      return '<svg aria-hidden="true" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>';
    }

    function deleteIcon() {
      return '<svg aria-hidden="true" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>';
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function partidoLabel(partido) {
      const teams = partido.equipo1 && partido.equipo2 ? ` - ${partido.equipo1} vs ${partido.equipo2}` : "";
      return `${partido.id_partido}${teams}`;
    }

    function participanteLabel(participante) {
      return `${participante.nombre} (#${participante.id})`;
    }

    function renderPartidoOptions() {
      if (!partidos.length) {
        fields.idPartido.innerHTML = '<option value="">Sin partidos disponibles</option>';
        return;
      }

      fields.idPartido.innerHTML = [
        '<option value="">Selecciona un partido</option>',
        ...partidos.map((partido) => `<option value="${escapeHtml(partido.id_partido)}">${escapeHtml(partidoLabel(partido))}</option>`)
      ].join("");
    }

    function renderParticipanteOptions() {
      if (!participantes.length) {
        fields.participante.innerHTML = '<option value="">Sin participantes disponibles</option>';
        return;
      }

      fields.participante.innerHTML = [
        '<option value="">Selecciona un participante</option>',
        ...participantes.map((participante) => `<option value="${participante.id}">${escapeHtml(participanteLabel(participante))}</option>`)
      ].join("");
    }

    function filteredQuinielas() {
      const term = search.value.trim().toLowerCase();
      if (!term) return quinielas;
      return quinielas.filter((quiniela) => {
        return [quiniela.id, quiniela.participante, quiniela.participante_nombre, quiniela.partido, quiniela.id_partido]
          .some((value) => String(value).toLowerCase().includes(term));
      });
    }

    function renderParticipanteCell(quiniela) {
      const name = quiniela.participante_nombre ? escapeHtml(quiniela.participante_nombre) : `ID ${quiniela.participante}`;
      return `${name} <span class="mono">#${quiniela.participante}</span>`;
    }

    function renderPartidoCell(quiniela) {
      if (quiniela.partido) {
        return escapeHtml(quiniela.partido);
      }

      return `<span class="mono">${escapeHtml(quiniela.id_partido)}</span>`;
    }

    function render() {
      const visibleQuinielas = filteredQuinielas();
      body.innerHTML = visibleQuinielas.map((quiniela) => `
        <tr>
          <td>${quiniela.id}</td>
          <td>${renderParticipanteCell(quiniela)}</td>
          <td>${renderPartidoCell(quiniela)}</td>
          <td>${renderScore(quiniela.result_eq1)}</td>
          <td>${renderScore(quiniela.result_eq2)}</td>
          <td><span class="points">${quiniela.puntos ?? 0}</span></td>
          <td>${escapeHtml(quiniela.updated_at)}</td>
          <td>
            <div class="row-actions">
              <button class="btn icon" type="button" data-action="edit" data-id="${quiniela.id}" title="Editar" aria-label="Editar quiniela ${quiniela.id}">${editIcon()}</button>
              <button class="btn icon" type="button" data-action="delete" data-id="${quiniela.id}" title="Eliminar" aria-label="Eliminar quiniela ${quiniela.id}">${deleteIcon()}</button>
            </div>
          </td>
        </tr>
      `).join("");

      emptyState.classList.toggle("hidden", visibleQuinielas.length > 0);
      totalChip.textContent = `${quinielas.length} ${quinielas.length === 1 ? "quiniela" : "quinielas"}`;
      updatePreview();
    }

    function updatePreview() {
      pointsPreview.textContent = "puntos se calculara automaticamente: 0";
    }

    function resetForm() {
      editingId = null;
      form.reset();
      formTitle.textContent = "Nueva quiniela";
      submitBtn.textContent = "Guardar";
      cancelEditBtn.classList.add("hidden");
      updatePreview();
    }

    function fillForm(quiniela) {
      editingId = quiniela.id;
      fields.participante.value = quiniela.participante;
      fields.idPartido.value = quiniela.id_partido;
      fields.resultEq1.value = quiniela.result_eq1 ?? "";
      fields.resultEq2.value = quiniela.result_eq2 ?? "";
      formTitle.textContent = `Editar quiniela #${quiniela.id}`;
      submitBtn.textContent = "Actualizar";
      cancelEditBtn.classList.remove("hidden");
      updatePreview();
      fields.participante.focus();
    }

    async function loadQuinielas() {
      try {
        body.innerHTML = "";
        emptyState.textContent = "Cargando quinielas...";
        emptyState.classList.remove("hidden");

        const payload = await request();
        quinielas = payload.data || [];
        partidos = payload.partidos || [];
        participantes = payload.participantes || [];
        sourceChip.textContent = payload.table ? `MySQL: ${payload.table}` : "MySQL";
        renderPartidoOptions();
        renderParticipanteOptions();
        emptyState.textContent = "Sin quinielas registradas";
        render();
      } catch (error) {
        quinielas = [];
        partidos = [];
        participantes = [];
        body.innerHTML = "";
        renderPartidoOptions();
        renderParticipanteOptions();
        totalChip.textContent = "0 quinielas";
        sourceChip.textContent = "Error DB";
        emptyState.textContent = error.message;
        emptyState.classList.remove("hidden");
        updatePreview();
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const quiniela = {
        participante: Number(fields.participante.value),
        id_partido: fields.idPartido.value,
        result_eq1: valueToScore(fields.resultEq1.value),
        result_eq2: valueToScore(fields.resultEq2.value)
      };

      submitBtn.disabled = true;
      submitBtn.textContent = editingId ? "Actualizando..." : "Guardando...";

      try {
        await request(editingId ? `?id=${editingId}` : "", {
          method: editingId ? "PUT" : "POST",
          body: JSON.stringify(quiniela)
        });
        resetForm();
        await loadQuinielas();
      } catch (error) {
        alert(error.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = editingId ? "Actualizar" : "Guardar";
      }
    });

    form.addEventListener("input", updatePreview);
    cancelEditBtn.addEventListener("click", resetForm);
    clearBtn.addEventListener("click", resetForm);
    search.addEventListener("input", render);

    body.addEventListener("click", async (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;

      const id = Number(button.dataset.id);
      const quiniela = quinielas.find((item) => item.id === id);
      if (!quiniela) return;

      if (button.dataset.action === "edit") {
        fillForm(quiniela);
        return;
      }

      if (button.dataset.action === "delete" && confirm(`Eliminar quiniela #${id}?`)) {
        try {
          await request(`?id=${id}`, { method: "DELETE" });
          if (editingId === id) resetForm();
          await loadQuinielas();
        } catch (error) {
          alert(error.message);
        }
      }
    });

    loadQuinielas();
  </script>
</body>
</html>
